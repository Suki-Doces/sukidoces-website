<div class="carousel-container">
    <div id="carousel" class="carousel-wrapper">

        <div class="carousel-slide" [style.transform]="transformStyle">
            <div class="carousel-item" *ngFor="let img of images; let i = index" [class.active]="i === currentIndex">
                <img [src]="img.src" [alt]="img.alt">
            </div>
        </div>

        <button id="prevBtn" class="nav-btn" (click)="prevSlide()">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                <g id="SVGRepo_iconCarrier">
                    <path d="M15 19L9 12L10.5 10.25M15 5L13 7.33333" stroke="#000000" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round"></path>
                </g>
            </svg>
        </button>
        <button id="nextBtn" class="nav-btn" (click)="nextSlide()">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                <g id="SVGRepo_iconCarrier">
                    <path d="M9 5L11 7.33333M9 19L15 12L13.5 10.25" stroke="#000000" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round"></path>
                </g>
            </svg>
        </button>

        <div id="indicators" class="indicators-wrapper">
            <button class="indicator" *ngFor="let img of images; let i = index" [class.active]="i === currentIndex"
                (click)="goToSlide(i)">
            </button>
        </div>

    </div>
</div>
