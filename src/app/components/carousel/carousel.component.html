<!--CAROUSEL-->
<div class="carousel-container">
    <!-- Container principal do carrossel -->
    <div id="carousel" class="carousel-wrapper">
        <!-- Slides do carrossel -->
        <div class="carousel-slide">
            <!-- Item 1 -->
            <div class="carousel-item">
                <img src="../../assets/images/carousel/banner-1.webp" alt="Imagem descritiva 1">
            </div>
            <!-- Item 2 -->
            <div class="carousel-item">
                <img src="../../assets/images/carousel/banner-2.webp" alt="Imagem descritiva 2">
            </div>
            <!-- Item 3 -->
            <div class="carousel-item">
                <img src="../../assets/images/carousel/banner-3.webp" alt="Imagem descritiva 3">
            </div>
            <!-- Item 4 -->
            <div class="carousel-item">
                <img src="../../assets/images/carousel/banner-4.webp" alt="Imagem descritiva 4">
            </div>
        </div>
        <!-- Botões de Navegação -->
        <button id="prevBtn" class="nav-btn">
            <svg width="24px" height="24px" stroke-width="1.5" viewBox="0 0 24 24" fill="none"
                xmlns="http://www.w3.org/2000/svg" color="#000000">
                <path d="M15 6L9 12L15 18" stroke="#000000" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round"></path>
            </svg>
        </button>
        <button id="nextBtn" class="nav-btn">
            <svg width="24px" height="24px" stroke-width="1.5" viewBox="0 0 24 24" fill="none"
                xmlns="http://www.w3.org/2000/svg" color="#000000">
                <path d="M9 6L15 12L9 18" stroke="#000000" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round"></path>
            </svg>
        </button>
        <!-- Indicadores de Posição -->
        <div id="indicators" class="indicators-wrapper">
            <!-- Os indicadores serão gerados pelo JavaScript -->
        </div>
    </div>
</div>
