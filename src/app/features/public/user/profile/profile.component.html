<div class="profile-container">
    
    <div class="alert success" *ngIf="feedbackMessage">{{ feedbackMessage }}</div>

    <section class="profile-card">
        <div class="profile-header">
            <div class="profile-avatar">
                <img src="assets/icons/interface/profile-icon.svg" alt="Avatar">
            </div>
            <div class="profile-title">
                <h1>Meus Dados</h1>
                <p>Atualize as suas informações pessoais</p>
            </div>
        </div>

        <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
            <div class="form-grid">
                
                <div class="input-group full-width">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" formControlName="nome" placeholder="Seu nome">
                </div>

                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" formControlName="email" placeholder="seu@email.com">
                </div>

                <div class="input-group">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" formControlName="telefone" placeholder="(00) 00000-0000">
                </div>

                <div class="full-width">
                    <button type="submit" class="btn-submit" [disabled]="profileForm.invalid">
                        Guardar Alterações
                    </button>
                </div>
            </div>
        </form>
    </section>

    <section class="profile-card danger-zone">
        <h2>Apagar Conta</h2>
        <p>Atenção: Esta ação é irreversível e apagará todo o seu histórico de pedidos.</p>
        <button class="btn-delete" type="button" (click)="deleteAccount()">
            Apagar a minha conta permanentemente
        </button>
    </section>
</div>
