<div class="checkout-wrapper">
  <div class="checkout-card">
    <h2 class="main-title">Finalizar Pedido</h2>

    <form [formGroup]="checkoutForm" class="checkout-form">
      
      <!-- Seção: Informações Básicas -->
      <div class="section-header">
        <h3 class="section-title">Informações Básicas</h3>
        <hr class="dashed-divider">
      </div>

      <div class="form-row-full">
        <div class="form-group">
          <label>Nome Completo</label>
          <input type="text" formControlName="nome" class="form-input">
        </div>
      </div>

      <div class="form-row-half">
        <div class="form-group">
          <label>E-mail (Não alterável)</label>
          <input type="email" formControlName="email" class="form-input">
        </div>
        <div class="form-group">
          <label>CPF</label>
          <input type="text" formControlName="cpf" placeholder="000.000.000-00" class="form-input" (blur)="onAutoSaveBlur()">
        </div>
      </div>

      <div class="form-row-half">
        <div class="form-group">
          <label>Telefone / WhatsApp</label>
          <input type="tel" formControlName="telefone" placeholder="(00) 00000-0000" class="form-input" (blur)="onAutoSaveBlur()">
        </div>
      </div>

      <!-- Seção: Endereço de Entrega -->
      <div class="section-header">
        <h3 class="section-title">Endereço de Entrega</h3>
        <hr class="dashed-divider">
      </div>

      <div class="form-row-half">
        <div class="form-group">
          <label>CEP</label>
          <input type="text" formControlName="cep" placeholder="00000-000" class="form-input" (blur)="onAutoSaveBlur()">
        </div>
        <div class="form-group">
          <label>Rua / Avenida</label>
          <input type="text" formControlName="ruaAvenida" placeholder="Nome da rua" class="form-input" (blur)="onAutoSaveBlur()">
        </div>
      </div>

      <div class="form-row-half">
        <div class="form-group">
          <label>Número</label>
          <input type="text" formControlName="numero" placeholder="Ex: 123" class="form-input" (blur)="onAutoSaveBlur()">
        </div>
        <div class="form-group">
          <label>Complemento</label>
          <input type="text" formControlName="complemento" placeholder="Apto, Bloco, Casa" class="form-input" (blur)="onAutoSaveBlur()">
        </div>
      </div>

      <div class="form-row-half">
        <div class="form-group">
          <label>Bairro</label>
          <input type="text" formControlName="bairro" placeholder="Seu bairro" class="form-input" (blur)="onAutoSaveBlur()">
        </div>
        <div class="form-group">
          <label>Cidade / Estado</label>
          <input type="text" formControlName="cidadeEstado" placeholder="Cidade - UF" class="form-input" (blur)="onAutoSaveBlur()">
        </div>
      </div>

      <div class="auto-save-indicator" *ngIf="salvandoDados">
        <small>Salvando alterações...</small>
      </div>

      <div class="checkout-actions">
        <!-- Mantendo a classe button-fill que você usa globalmente -->
        <button type="button" class="btn button-fill btn-checkout" (click)="finalizarCompra()">
          Continuar
        </button>
      </div>

    </form>
  </div>
</div>
